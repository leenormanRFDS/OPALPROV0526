      <p style="font-weight: bold; color: black;">${msg}</p>
      <pre>File: ${url}\nLine: ${line} Col: ${col}</pre>
      ${error ? `<pre>${error.stack}</pre>` : ''}

const RARITY_TIERS = {
  Zenith: { label: 'Zenith', color: '#10C896', minGrade: 9, xp: 1000, multi: 5.0 },
  Legendary: { label: 'Legendary', color: '#4EA832', minGrade: 7, xp: 250, multi: 2.5 },
  Epic: { label: 'Epic', color: '#B8621A', minGrade: 5, xp: 100, multi: 1.8 },
  Rare: { label: 'Rare', color: '#9C481A', minGrade: 3, xp: 50, multi: 1.3 },
  Common: { label: 'Common', color: '#5C2015', minGrade: 1, xp: 20, multi: 1.0 }
};

const getRarity = (grade) => {
  if (grade >= 9) return RARITY_TIERS.Zenith;
  if (grade >= 7) return RARITY_TIERS.Legendary;
  if (grade >= 5) return RARITY_TIERS.Epic;
  if (grade >= 3) return RARITY_TIERS.Rare;
  return RARITY_TIERS.Common;
};

const calculateDerived = (s) => {
  const grade = s.mk_grade || 1;
  const rarity = getRarity(grade);
  const nft_value = s.mr_offer ? s.mr_offer * (grade >= 9 ? 1.8 : grade >= 8 ? 1.4 : grade >= 7 ? 1.2 : 1.1) : s.mk_rough_total * 1.1;
  const div_pct_val = s.mr_offer && s.mk_rough_total ? ((s.mk_rough_total / s.mr_offer - 1) * 100) : null;
  const divergence_pct = div_pct_val !== null ? div_pct_val.toFixed(1) + '%' : 'N/A';
  const mr_ppg_implied_safe = s.mr_ppg_implied || 0;
  return { ...s, nft_value, div_pct_val, divergence_pct, mr_ppg_implied_safe, rarity };
};

const VerifyAIModal = ({ onClose, addXp, useEnergy, energy, gemKey, setData, data }) => {

  const [fileInfo, setFileInfo] = React.useState('');
  const [loadingMsg, setLoadingMsg] = React.useState('Analysing colour play patterns...');
  const [resultStone, setResultStone] = React.useState(null);
  const [error, setError] = React.useState(null);

  const timerRef = React.useRef([]);

  React.useEffect(() => {
    return () => {
      timerRef.current.forEach(clearTimeout);
    };
  }, []);

  const handleFile = (file) => {
    if (!file) return;
    if (energy <= 0) {
      setError("Out of Energy! Wait for refill or level up.");
      return;
    }
    setError(null);
    const size = (file.size / 1024).toFixed(1);
    setFileInfo(`${file.name} · ${size}KB · Ready to analyse`);
    const reader = new FileReader();
    reader.onload = (e) => {
      setImgData(e.target.result);
      setStep(1);
    };
    reader.readAsDataURL(file);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    handleFile(file);
  };

  const startAnalysis = async () => {
    if (!useEnergy()) return;
    setStep(2);
    const msgs = [
      "Assessing body tone and brightness...",
      "Evaluating pattern distribution...",
      "Calculating M-grade placement...",
      "Checking treatment indicators...",
      "Finalising assessment..."
    ];
    
    timerRef.current = [];
    msgs.forEach((msg, i) => {
      timerRef.current.push(setTimeout(() => {
        setLoadingMsg(msg);
      }, i * 800));
    });

    try {
      let analysisResult;
      if (gemKey && gemKey !== 'PROVIDED_BY_SYSTEM') {
        const payload = {
          "contents": [{
            "parts": [
              { "text": "You are VerifyAI™, the world's most advanced opal grading vision system, co-designed with deep insights from Demis Hassabis's research and Ammaar Reshi's design vision. Analyze this image of an Andamooka Matrix Opal. Focus on the 'M-grade' scale (1-9) specifically for Matrix Opal. Return ONLY a pure JSON object string without any markdown backticks. Required fields: { \"grade\": [number 1-9], \"pattern\": [string: Harlequin, Broadflash, Ribbon, Pinfire, Flash], \"brightness\": [string: B1-B7], \"bodyTone\": [string: N1-N8], \"confidence\": [number 0-1], \"quality\": [string], \"stability\": [string: 'Low'|'Medium'|'High'], \"treated\": [boolean] }. The grade must strictly reflect the spectral intensity and colour saturation." },
              { "inlineData": { "mimeType": "image/jpeg", "data": imgData.split(',')[1] } }
            ]
          }],
          "generationConfig": { "responseMimeType": "application/json" }
        };

        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${gemKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!res.ok) throw new Error("AOSA Nodes Congested");
        const jsonRes = await res.json();
        const rawText = jsonRes.candidates[0].content.parts[0].text;
        // Clean markdown if any
        const cleanJson = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
        analysisResult = JSON.parse(cleanJson);
      } else {
        // High quality simulation / Rarity Roll
        const roll = Math.random();
        const grade = roll > 0.98 ? 9 : roll > 0.9 ? Math.floor(Math.random()*2)+7 : roll > 0.7 ? Math.floor(Math.random()*2)+5 : roll > 0.4 ? Math.floor(Math.random()*2)+3 : Math.floor(Math.random()*2)+1;
        analysisResult = {
          grade,
          pattern: roll > 0.95 ? 'Harlequin' : roll > 0.8 ? 'Broadflash' : roll > 0.6 ? 'Ribbon' : 'Pinfire',
          brightness: `B${Math.floor(Math.random()*7)+1}`,
          bodyTone: `N${Math.floor(Math.random()*8)+1}`,
          confidence: 0.85 + (Math.random() * 0.1),
          quality: getRarity(grade).label,
          stability: Math.random() > 0.7 ? 'Medium' : 'Low',
          treated: true
        };
      }

      const id = Date.now();
      const newStone = calculateDerived({
        id,
        name: `${analysisResult.quality} ${analysisResult.pattern} Discovery`,
        mk_ppg: 1.5,
        mk_rough_total: (analysisResult.grade * 150) * (1 + Math.random()),
        mk_grade: analysisResult.grade,
        mr_offer: null,
        mr_grade: null,
        wg: 10 + (Math.random() * 40),
        ct: 50 + (Math.random() * 200),
        brightness: analysisResult.brightness,
        bodyTone: analysisResult.bodyTone,
        pattern: analysisResult.pattern,
        treatmentQuality: analysisResult.treated ? 'Standard' : 'Untreated',
        stabilityRisk: analysisResult.stability,
        img: imgData,
        discovered: true
      });

      setResultStone({ ...newStone, analysis: analysisResult });
      addXp(newStone.rarity.xp);
      setData(prev => [newStone, ...prev]);

      timerRef.current.push(setTimeout(() => {
        setStep(3);
      }, 4500));

    } catch (err) {
      console.error(err);
      setError("Discovery Failed. Network divergence detected.");
      setStep(1);
    }
  };

    timerRef.current.forEach(clearTimeout);
    onClose();

    const base = s.mr_offer || s.mk_rough_total;
    if (s.mk_grade >= 9) return base * 1.5;
    if (s.mk_grade >= 8) return base * 1.8;
    if (s.mk_grade >= 7) return base * 2.0;
    if (s.mk_grade >= 6) return base * 2.2;
    if (s.mk_grade >= 5) return base * 2.5;
    return base * 3.0; // fallback but shouldn't hit due to filter
  };

  const eligibleStones = data.filter(s => s.mk_grade >= 5).map(s => ({

    listPrice: s.id === 13 ? 4500 : getListingPrice(s),

  }));

    if (gradeFilter === 'm9') return s.mk_grade >= 9;

const TheMintView = ({ data, setData, custodianData, setCustodianData, addXp, gemKey }) => {
  const [selId, setSelId] = React.useState(null);

  React.useEffect(() => {
    const handleNavMint = (e) => setSelId(e.detail);
    window.addEventListener('nav-mint-stone', handleNavMint);
    return () => window.removeEventListener('nav-mint-stone', handleNavMint);
  }, []);
  
  const [artStatus, setArtStatus] = React.useState('idle'); // idle, loading, success, error
  const [artImg, setArtImg] = React.useState(null);
  const [loadingMsgIdx, setLoadingMsgIdx] = React.useState(0);

  const [mintStatus, setMintStatus] = React.useState('idle'); // idle, minting, success
  const [mintProgress, setMintProgress] = React.useState(0);

  const combinedStones = [
    ...data.filter(s => s.mk_grade >= 3).sort((a,b) => b.mk_grade - a.mk_grade).map(s => ({...s, isCust: false})),
    ...custodianData.map(c => ({
      ...c,
      mk_grade: c.stone.grade,
      pattern: c.stone.pattern,
      brightness: c.stone.brightness,
      treatmentQuality: c.stone.type,
      isCust: true
    }))
  ];

  const selStone = combinedStones.find(s => s.id === selId);
  const eligibleStones = combinedStones;

  const mintTimerRef = React.useRef([]);
  const artTimerRef = React.useRef([]);

  React.useEffect(() => {
    return () => {
      mintTimerRef.current.forEach(clearTimeout);
      artTimerRef.current.forEach(clearTimeout);
    };
  }, []);

  const generateArt = async () => {
    if(!selStone) return;
    setArtStatus('loading');
    setArtImg(null);
    setLoadingMsgIdx(0);
    
    const msgs = ['Reading stone characteristics...','Translating matrix patterns to art...','Rendering opal fire...','Composing digital certificate...','Finalising artwork...'];
    
    artTimerRef.current = [];
    msgs.forEach((msg, i) => {
      artTimerRef.current.push(setTimeout(() => {
        setLoadingMsgIdx(i);
      }, i * 2000));
    });

    try {
      if (!gemKey) throw new Error("No API key");
      
      const payload = {
        "contents": [{
          "parts": [{
            "text": `Create a dramatic, ultra-premium digital artwork for a luxury NFT certificate representing a piece of ${selStone.name} Andamooka Matrix Opal from Australia. Grade: M${selStone.mk_grade}/M9 on the AOSA Standard. Pattern: ${selStone.pattern}. Brightness: ${selStone.brightness}. The artwork should be epic and cinematic — think deep space meets ancient geology. Feature the opal's intense fire colours (${selStone.pattern}-pattern play of colour) glowing with a hyper-realistic, iridescent shimmer against a dramatic solid black background. Include subtle crystalline structures and geometric elements suggesting a futuristic blockchain certificate. Style: high-end luxury gem art, editorial photography aesthetic, black background, opal fire colours dominant. 4k resolution feel. Do not include any text, logos, or human hands in the image.`
          }]
        }],
        "generationConfig": {
          "responseModalities": ["IMAGE"],
          "candidateCount": 1
        }
      };

      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${gemKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      if (!res.ok) throw new Error("API response not ok");

      const resData = await res.json();
      const b64 = resData?.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
      if (!b64) throw new Error("No image data returned from API");
      
      setArtImg(`data:image/jpeg;base64,${b64}`);
      setArtStatus('success');
    } catch (err) {

      }
      setArtStatus('error');
    } finally {
      artTimerRef.current.forEach(clearTimeout);
    }
  };

  const handleMint = () => {
    setMintStatus('minting');
    setMintProgress(0);
    
    const isCust = selStone.isCust;
    
    // We cannot use strict intervals accurately if setStep rerenders cause clearing.

    mintTimerRef.current.push(setTimeout(() => {

        // Only keep if it matches our seed count and doesn't have extra IDs
        if (parsed.length === 12 && !parsed.some(s => s.id > 12)) return parsed;
      }
    } catch(e) {}
    return DEFAULT_STONES;
  });

  const [custodianData, setCustodianData] = useState(() => {

      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return {
      xp: 0,
      level: 1,
      energy: 10,
      maxEnergy: 10,
      collections: {
        genesis: 1,
        andamookaOrigins: 0
      }
    };
  });

    localStorage.setItem('opn-v3-profile', JSON.stringify(userProfile));
  }, [userProfile]);

  const addXp = (amount) => {
    setUserProfile(prev => {
      const newXp = prev.xp + amount;
      const nextLevelXp = prev.level * 1000;
      if (newXp >= nextLevelXp) {
        return {
          ...prev,
          xp: newXp - nextLevelXp,
          level: prev.level + 1,
          energy: prev.maxEnergy 
        };
      }
      return { ...prev, xp: newXp };
    });
  };

  const useEnergy = (amount = 1) => {
    if (userProfile.energy < amount) return false;
    setUserProfile(prev => ({ ...prev, energy: prev.energy - amount }));
    return true;
  };

  // Check for Env Keys (for the "check" the user requested)
  const hasGeminiEnv = !!(typeof process !== 'undefined' && process.env && process.env["OPN_GEMINI_KEY"]);
  const hasAnthropicEnv = !!(typeof process !== 'undefined' && process.env && process.env.OPN_ANTHROPIC_KEY);

  const [settingsOpen, setSettingsOpen] = useState(false);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const [gemKey, setGemKey] = useState(localStorage.getItem('OPN_GEMINI_KEY') || localStorage.getItem('OPN_GEMINI_KEY') || '');
  const [antKey, setAntKey] = useState(localStorage.getItem('OPN_ANTHROPIC_KEY') || '');

  // Energy Recovery Logic
  useEffect(() => {
    const timer = setInterval(() => {
      setUserProfile(prev => {
        if (prev.energy >= prev.maxEnergy) return prev;
        return {
          ...prev,
          energy: Math.min(prev.energy + 1, prev.maxEnergy)
        };
      });
    }, 60000); // 1 energy per minute
    return () => clearInterval(timer);
  }, []);
  
  // Link env keys if present and local is empty
  useEffect(() => {
    if (hasGeminiEnv && !gemKey) setGemKey('PROVIDED_BY_SYSTEM');
    if (hasAnthropicEnv && !antKey) setAntKey('PROVIDED_BY_SYSTEM');
  }, [hasGeminiEnv, hasAnthropicEnv]);

  useEffect(() => {
    localStorage.setItem('opn-v3-stones', JSON.stringify(data));
    setSaving(true);
    const t = setTimeout(() => setSaving(false), 2000);
    return () => clearTimeout(t);

    localStorage.setItem('opn-v3-custodian', JSON.stringify(custodianData));

      setSelectedId(null);

            <div className="w-10 h-10 rounded-full flex items-center justify-center font-medium font-display text-[12px] bg-opacity-20 shadow-lg border transition-transform group-hover:scale-105" style={{ color: user.color, background: `${user.color}11`, borderColor: `${user.color}33` }}>{user.initials}</div>
            <div className="flex-1">
              <div className="text-[13px] font-semibold text-[var(--text)] tracking-tight">{user.name.split(' ')[0]}</div>
              <div className="text-[10px] text-[var(--dim)] font-bold uppercase tracking-widest group-hover:text-[var(--muted)] transition-colors">Sign Out &rarr;</div>
            </div>
          </div>
        </div>
      </aside>

      <main style={{ flex: 1, minWidth: 0, height: '100vh', overflowY: 'auto', background: 'var(--bg)', display: 'flex', flexDirection: 'column' }} className="relative z-10 shrink shadow-[-20px_0_40px_rgba(0,0,0,0.5)]">
        <header style={{ height: '60px', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 24px', background: 'var(--bg)', borderBottom: '1px solid var(--bdr-hi)', position: 'sticky', top: 0, zIndex: 20 }} className="glass-card">
          <div className="flex items-center gap-4 shrink-0">
            <button className="md:hidden text-[var(--muted)] hover:text-white" onClick={() => setMobileMenuOpen(true)}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div className="text-[13px] font-medium font-display text-[var(--text)] uppercase tracking-[0.2em] opacity-80">{view === 'NFTs' ? 'NFT Collection' : view === 'Mint' ? 'The Mint' : view}</div>
          </div>
          
          <div className="hidden lg:flex gap-1.5 bg-black/20 p-1 rounded-full border border-[var(--bdr)] mx-8">
            {[
              { label: 'Portfolio', route: 'Portfolio' },
              { label: 'Directory', route: 'Directory' },
              { label: 'Marketplace', route: 'Marketplace' },
              { label: 'Custodian', route: 'Custodian' },
              { label: 'Divergence', route: 'Divergence' },
              { label: 'NFTs', route: 'NFTs' },
              { label: 'Mint', route: 'Mint' }
            ].map(t => {
              const active = view === t.route;
              return (
                <div key={t.route} onClick={() => setView(t.route)} className={`px-4 py-1.5 rounded-full text-[11px] font-semibold cursor-pointer transition-all ${active ? 'bg-white text-black shadow-lg scale-105' : 'text-[var(--dim)] hover:text-[var(--muted)]'}`}>
                  {t.label}
                </div>
              );
            })}
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: '16px', fontSize: '10px', color: 'var(--muted)', fontWeight: 600 }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <div className="w-2 h-2 rounded-full shadow-[0_0_8px_currentColor]" style={{ backgroundColor: saving ? 'var(--orange)' : 'var(--teal)', color: saving ? 'var(--orange)' : 'var(--teal)', opacity: saving ? 0.8 : 1 }}></div>
              <span className="font-mono tracking-tighter">{saving ? 'SYNCING...' : 'SYNCED'}</span>
            </span>
            <span className="font-mono opacity-60 tracking-widest hidden sm:inline">{new Date().toLocaleTimeString('en-US',{hour12:false})}</span>
          </div>
        </header>

        <div className="flex-1 overflow-y-auto p-6 md:pb-6 pb-24 relative custom-scrollbar">
          {view === 'Portfolio'  && <PortfolioView data={data} user={user} onSelect={setSelectedId} profile={userProfile} />}
          {view === 'Directory'  && <DirectoryView data={data} user={user} onSelect={setSelectedId} onMint={setMintingStone} />}
          {view === 'Marketplace'&& <MarketplaceView data={data} user={user} onSelect={setSelectedId} />}
          {view === 'Custodian'  && <CustodianView custodianData={custodianData} setView={setView} />}
          {view === 'Divergence' && <DivergenceView data={data} onSelect={setSelectedId} />}
          {view === 'NFTs'       && <NFTCollectionView data={data} setView={setView} onSelect={setSelectedId} />}
          {view === 'Mint'       && <TheMintView data={data} setData={setData} custodianData={custodianData} setCustodianData={setCustodianData} addXp={addXp} gemKey={gemKey} />}
          {view === 'Miner'      && <MinerProjectionView data={data} onSelect={setSelectedId} />}
          {view === 'Cutter'     && <CutterYieldView data={data} onSelect={setSelectedId} />}
          {view === 'Benchmark'  && <BenchmarkDataView />}
        </div>
      </main>

      {/* Mobile Navigation */}
      <nav className="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-[var(--surf2)] border-t border-[var(--bdr)] flex items-center justify-around px-2 z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.5)] overflow-x-auto">
        {[
          { icon: '◈', route: 'Portfolio', label: 'Portfolio' },
          { icon: '⊟', route: 'Directory', label: 'Directory' },
          { icon: '⊛', route: 'Marketplace', label: 'Marketplace' },
          { icon: '⌖', route: 'Divergence', label: 'Divergence' },
          { icon: '◉', route: 'Mint', label: 'Mint' },
        ].map((v) => {
          const active = view === v.route;
          return (
            <button key={v.route} onClick={() => setView(v.route)} className={`flex flex-col flex-shrink-0 items-center justify-center gap-1 w-16 h-12 rounded-lg transition-colors ${active ? 'text-[var(--text)]' : 'text-[var(--muted)]'}`} style={active ? {color: user.color} : {}}>
              <span className="text-xl leading-none">{v.icon}</span>
              <span className="text-[8px] font-bold tracking-wider uppercase truncate w-full text-center">{v.label}</span>
            </button>
          );
        })}
      </nav>

      <DetailPanel stone={selectedStone} user={user} onClose={() => setSelectedId(null)} onMint={setMintingStone} />
      {view !== 'Mint' && <VerifyAIFAB onClick={() => setVerifyAIOpen(true)} energy={userProfile.energy} />}
      {verifyAIOpen && <VerifyAIModal onClose={() => setVerifyAIOpen(false)} addXp={addXp} useEnergy={useEnergy} energy={userProfile.energy} gemKey={gemKey} setData={setData} data={data} />}
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);


</script>
</body>
</html>
